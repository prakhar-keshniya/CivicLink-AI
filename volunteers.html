<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteers Roster - CivicLink AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .volunteer-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .volunteer-table th, .volunteer-table td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .volunteer-table th {
            background-color: var(--surface-light);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .volunteer-table tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .volunteer-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .v-avatar {
            min-width: 40px;
            padding: 0 8px;
            height: 40px;
            border-radius: 20px;
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .v-info h4 { margin-bottom: 4px; color: var(--text-primary); }
        .v-info span { font-size: 0.8rem; color: var(--text-muted); }
        
        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-pill.ready { background-color: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-pill.busy { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-pill.matched { background-color: rgba(139, 92, 246, 0.1); color: #8B5CF6; border: 1px solid rgba(139, 92, 246, 0.2); }
        .status-pill.unavailable { background-color: rgba(107, 114, 128, 0.1); color: var(--text-muted); border: 1px solid rgba(107, 114, 128, 0.2); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-network-wired logo-icon"></i>
                    <span>CivicLink <span class="highlight">AI</span></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> Command Center</a></li>
                    <li><a href="needs.html"><i class="fa-solid fa-triangle-exclamation"></i> Urgent Needs</a></li>
                    <li class="active"><a href="volunteers.html"><i class="fa-solid fa-users"></i> Volunteers</a></li>
                    <li><a href="matches.html"><i class="fa-solid fa-handshake-angle"></i> Smart Matches</a></li>
                    <li><a href="heatmap.html"><i class="fa-solid fa-map-location-dot"></i> Heatmap</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search by name, skill, or location...">
                </div>
                <div class="topbar-actions">
                    <div class="profile-menu">
                        <div class="profile-avatar" id="userProfileBtn">
                            <!-- Initials populated by JS -->
                        </div>
                        <div class="dropdown-menu" id="profileDropdown">
                            <div class="dropdown-header">
                                <span class="user-name" id="dropdownUserName">Loading...</span>
                                <span class="user-email" id="dropdownUserEmail">...</span>
                            </div>
                            <button class="dropdown-item" onclick="showSettingsModal()">
                                <i class="fa-solid fa-gear"></i> Settings
                            </button>
                            <button class="dropdown-item" onclick="switchAccount()">
                                <i class="fa-solid fa-arrows-rotate"></i> Switch Account
                            </button>
                            <div style="border-top: 1px solid var(--border); margin: 4px 0;"></div>
                            <button class="dropdown-item danger" onclick="handleLogout()">
                                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Volunteer Roster &nbsp;<span id="liveVolIndicator" style="display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:500;color:var(--success);background:rgba(16,185,129,0.1);padding:4px 10px;border-radius:20px;vertical-align:middle;transition:transform 0.3s;"><span class="status-indicator online"></span> LIVE</span></h1>
                        <p class="page-subtitle" id="volunteerSubtitle">Loading roster...</p>
                    </div>
                    <button class="primary-btn" onclick="openAddVolunteerModal()"><i class="fa-solid fa-user-plus"></i> Invite Volunteer</button>
                </div>

                <table class="volunteer-table">
                    <thead>
                        <tr>
                            <th>Volunteer</th>
                            <th>Status</th>
                            <th>Primary Skills</th>
                            <th>Location Zone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="volunteerList">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Volunteer Modal -->
    <div id="addVolunteerModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100;">
        <div class="modal-content" style="background: var(--surface); padding: 30px; border-radius: var(--radius-md); border: 1px solid var(--border); width: 100%; max-width: 500px;">
            <span style="float: right; cursor: pointer; color: var(--text-muted);" onclick="closeAddVolunteerModal()"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 20px;">Invite New Volunteer</h3>
            
            <input type="text" id="newVolName" placeholder="Full Name" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            <input type="text" id="newVolInitials" placeholder="Initials (e.g. SJ)" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            
            <select id="newVolStatus" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
                <option value="Ready for Dispatch">Ready for Dispatch</option>
                <option value="On Mission">On Mission</option>
                <option value="Unavailable">Unavailable</option>
            </select>
            
            <input type="text" id="newVolLocation" placeholder="Location Zone" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            <input type="text" id="newVolSkills" placeholder="Skills (comma separated)" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px;">
            
            <button class="primary-btn" style="width: 100%; padding: 12px;" onclick="submitNewVolunteer()">Add Volunteer</button>
        </div>
    </div>

    <!-- View/Edit Profile Modal -->
    <div id="profileModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100;">
        <div class="modal-content" style="background: var(--surface); padding: 30px; border-radius: var(--radius-md); border: 1px solid var(--border); width: 100%; max-width: 500px;">
            <span style="float: right; cursor: pointer; color: var(--text-muted);" onclick="closeProfileModal()"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 20px;">Volunteer Profile</h3>
            
            <input type="hidden" id="editVolId">
            <input type="text" id="editVolName" placeholder="Full Name" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            <input type="text" id="editVolInitials" placeholder="Initials (e.g. SJ)" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            
            <select id="editVolStatus" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
                <option value="Ready for Dispatch">Ready for Dispatch</option>
                <option value="On Mission">On Mission</option>
                <option value="Unavailable">Unavailable</option>
            </select>
            
            <input type="text" id="editVolLocation" placeholder="Location Zone" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 15px;">
            <input type="text" id="editVolSkills" placeholder="Skills (comma separated)" style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text-primary); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 20px;">
            
            <div style="display: flex; gap: 10px;">
                <button class="primary-btn" style="flex: 1; padding: 12px;" onclick="submitEditVolunteer()">Save Changes</button>
                <button class="primary-btn" style="flex: 1; padding: 12px;" onclick="deleteVolunteer()">Delete Profile</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allVolunteers = [];
        let searchQuery = '';
        let liveUpdateInterval = null;

        // --- STATUS CYCLING ENGINE ---
        // Silently rotates volunteer statuses to simulate a live mission board
        const statusCycle = ['Active Deployment', 'Ready for Dispatch', 'On Mission', 'Active Deployment', 'Active Deployment'];
        function getNextStatus(current) {
            const idx = statusCycle.indexOf(current);
            return statusCycle[(idx + 1) % statusCycle.length];
        }

        async function loadVolunteers(silent = false) {
            const token = localStorage.getItem('civiclink_token');
            if (!token) return;
            try {
                const response = await fetch('/api/volunteers', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) return;
                const volunteers = await response.json();

                if (!silent) {
                    // First load: full render
                    allVolunteers = volunteers;
                    const subtitle = document.getElementById('volunteerSubtitle');
                    if (subtitle) subtitle.textContent = `Managing ${volunteers.length} registered community responders`;
                    renderVolunteers(getFilteredVolunteers());

                    // Attach search
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            searchQuery = e.target.value.toLowerCase();
                            renderVolunteers(getFilteredVolunteers());
                        });
                    }
                } else {
                    // Silent update: handle new volunteers and status changes
                    let changed = false;
                    let needsReRender = false;
                    
                    if (volunteers.length !== allVolunteers.length) {
                        needsReRender = true;
                        changed = true;
                    }

                    volunteers.forEach(newV => {
                        const old = allVolunteers.find(v => v.id === newV.id);
                        if (!old) {
                            needsReRender = true;
                            changed = true;
                        } else if (old.status !== newV.status) {
                            // Find the row and update just the status pill
                            const row = document.querySelector(`tr[data-vol-id="${newV.id}"]`);
                            if (row) {
                                const pill = row.querySelector('.status-pill');
                                if (pill) {
                                    const { cls, icon } = getStatusStyle(newV.status);
                                    pill.className = `status-pill ${cls}`;
                                    pill.innerHTML = `${icon} ${newV.status}`;
                                    // Subtle flash animation
                                    pill.style.transition = 'opacity 0.3s';
                                    pill.style.opacity = '0.4';
                                    setTimeout(() => { pill.style.opacity = '1'; }, 300);
                                }
                            }
                            old.status = newV.status;
                            changed = true;
                        }
                    });

                    if (needsReRender) {
                        allVolunteers = volunteers;
                        const subtitle = document.getElementById('volunteerSubtitle');
                        if (subtitle) subtitle.textContent = `Managing ${volunteers.length} registered community responders`;
                        renderVolunteers(getFilteredVolunteers());
                    }

                    if (changed) {
                        // Animate the live indicator
                        const indicator = document.getElementById('liveVolIndicator');
                        if (indicator) {
                            indicator.style.transform = 'scale(1.4)';
                            setTimeout(() => { indicator.style.transform = 'scale(1)'; }, 400);
                        }
                    }
                }
            } catch (err) {
                if (!silent) console.error('Failed to load volunteers', err);
            }
        }

        function getFilteredVolunteers() {
            if (!searchQuery) return allVolunteers;
            return allVolunteers.filter(v =>
                v.name.toLowerCase().includes(searchQuery) ||
                v.location.toLowerCase().includes(searchQuery) ||
                v.status.toLowerCase().includes(searchQuery) ||
                (v.skills || []).some(s => s.toLowerCase().includes(searchQuery))
            );
        }

        function getStatusStyle(status) {
            if (status === 'On Mission') return { cls: 'busy', icon: '<i class="fa-solid fa-spinner fa-spin"></i>' };
            if (status === 'Unavailable') return { cls: 'unavailable', icon: '<i class="fa-solid fa-minus"></i>' };
            if (status === 'Matched') return { cls: 'matched', icon: '<i class="fa-solid fa-link"></i>' };
            if (status === 'Active Deployment') return { cls: 'ready', icon: '<span class="status-indicator online"></span>' };
            return { cls: 'ready', icon: '<span class="status-indicator online"></span>' };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadVolunteers(false);
            // Live update every 8 seconds (silent, no re-render)
            liveUpdateInterval = setInterval(() => loadVolunteers(true), 8000);
        });

        function renderVolunteers(volunteers) {
            const list = document.getElementById('volunteerList');
            if (!list) return;

            if (volunteers.length === 0) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);"><i class="fa-solid fa-users-slash" style="font-size:2rem; margin-bottom:8px;"></i><br>No matching volunteers found.</td></tr>';
                return;
            }

            list.innerHTML = volunteers.map(v => {
                const skills = Array.isArray(v.skills) ? v.skills : (v.skills || '').split(',').filter(s => s);
                const { cls, icon } = getStatusStyle(v.status);
                const safeName = (v.name || '').replace(/'/g, "\\'");
                const safeLocation = (v.location || '').replace(/'/g, "\\'");

                return `
                <tr data-vol-id="${v.id}">
                    <td>
                        <div class="volunteer-profile">
                            <div class="v-avatar">${v.initials || (v.name||'?').substring(0,2).toUpperCase()}</div>
                            <div class="v-info">
                                <h4>${v.name}</h4>
                                <span>ID: ${v.id}</span>
                            </div>
                        </div>
                    </td>
                    <td><span class="status-pill ${cls}">${icon} ${v.status}</span></td>
                    <td>
                        <div class="need-tags">
                            ${skills.map(skill => `<span class="tag skill-tag">${skill.trim()}</span>`).join('')}
                        </div>
                    </td>
                    <td>${v.location}</td>
                    <td><button class="btn-secondary" onclick="openProfileModal('${v.id}', '${safeName}', '${v.initials}', '${v.status}', '${safeLocation}', '${skills.join(', ')}')">View Profile</button></td>
                </tr>
                `;
            }).join('');
        }

        function openAddVolunteerModal() { document.getElementById('addVolunteerModal').style.display = 'flex'; }
        function closeAddVolunteerModal() { document.getElementById('addVolunteerModal').style.display = 'none'; }

        async function submitNewVolunteer() {
            const name = document.getElementById('newVolName').value;
            const initials = document.getElementById('newVolInitials').value;
            const status = document.getElementById('newVolStatus').value;
            const location = document.getElementById('newVolLocation').value;
            const skills = document.getElementById('newVolSkills').value.split(',').map(s => s.trim()).filter(s => s);

            if (!name || !location) return alert('Name and Location are required!');

            try {
                const token = localStorage.getItem('civiclink_token');
                const res = await fetch('/api/volunteers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, initials, status, location, skills })
                });

                if (res.ok) {
                    closeAddVolunteerModal();
                    window.location.reload();
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to add volunteer');
                }
            } catch (err) {
                console.error(err);
                alert('Server error');
            }
        }

        function openProfileModal(id, name, initials, status, location, skills) {
            document.getElementById('editVolId').value = id;
            document.getElementById('editVolName').value = name;
            document.getElementById('editVolInitials').value = initials;
            document.getElementById('editVolStatus').value = status;
            document.getElementById('editVolLocation').value = location;
            document.getElementById('editVolSkills').value = skills;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('profileModal').style.display = 'none';
        }

        async function submitEditVolunteer() {
            const id = document.getElementById('editVolId').value;
            const name = document.getElementById('editVolName').value;
            const initials = document.getElementById('editVolInitials').value;
            const status = document.getElementById('editVolStatus').value;
            const location = document.getElementById('editVolLocation').value;
            const skills = document.getElementById('editVolSkills').value.split(',').map(s => s.trim()).filter(s => s);

            try {
                const token = localStorage.getItem('civiclink_token');
                const res = await fetch(`/api/volunteers/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name, initials, status, location, skills })
                });

                if (res.ok) window.location.reload();
                else alert('Failed to update volunteer');
            } catch (err) { console.error(err); }
        }

        async function deleteVolunteer() {
            if(!confirm('Are you sure you want to completely remove this volunteer?')) return;
            const id = document.getElementById('editVolId').value;
            try {
                const token = localStorage.getItem('civiclink_token');
                const res = await fetch(`/api/volunteers/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) window.location.reload();
                else alert('Failed to delete volunteer');
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
