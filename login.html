<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CivicLink AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            overflow: hidden;
            position: relative;
        }

        /* Premium Background Effects */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(11, 15, 25, 0) 70%);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(11, 15, 25, 0) 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo {
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px 12px 40px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .input-icon {
            position: absolute;
            bottom: 14px;
            left: 16px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control:focus+.input-icon {
            color: var(--primary);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .forgot-password:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #2563eb);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--primary-glow);
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider span {
            padding: 0 12px;
        }

        .sso-btn {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .sso-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fa-solid fa-network-wired logo-icon"></i>
                <span>CivicLink <span class="highlight">AI</span></span>
            </div>
            <p>Welcome back, please sign in to your account.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div style="position: relative;">
                    <input type="email" id="email" class="form-control" placeholder="admin@civiclink.ai" required>
                    <i class="fa-regular fa-envelope input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember" checked>
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <div id="errorMessage"
                style="color: var(--danger); font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: center;">
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Hidden div for Google button rendering -->
        <div id="googleBtnContainer" style="display: flex; justify-content: center;"></div>

        <button class="sso-btn" id="customGoogleBtn" onclick="triggerGoogleSignIn()">
            <i class="fa-brands fa-google" style="color: #ea4335;"></i> Sign in with Google
        </button>
    </div>

    <script>
        // Set your real Google Client ID here
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

        window.onload = function () {
            // Initialize Google Identity Services
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleResponse
            });
        };

        function triggerGoogleSignIn() {
            // If you haven't replaced the Client ID, we simulate a Google Login for testing purposes
            if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
                console.log("Simulating Google Sign-In (Developer Mode)...");
                handleGoogleResponse({ credential: "MOCK_GOOGLE_TOKEN_123" });
                return;
            }
            // Trigger the actual Google popup if a real ID is provided
            google.accounts.id.prompt();
        }

        async function handleGoogleResponse(response) {
            const errorMessage = document.getElementById('errorMessage');

            try {
                // Send the Google JWT to our backend
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('civiclink_token', data.token);
                    localStorage.setItem('civiclink_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.error || 'Google login failed');
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            }
        }
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const btn = document.querySelector('.btn-login');
            const originalText = btn.innerHTML;

            // Clear previous errors and show loading state
            errorMessage.style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Login successful, save token and user info
                    localStorage.setItem('civiclink_token', data.token);
                    localStorage.setItem('civiclink_user', JSON.stringify(data.user));

                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Success!';
                    btn.style.backgroundColor = 'var(--success)';

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    // Login failed, show error
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                // Handle network or authentication errors
                errorMessage.textContent = error.message === 'Failed to fetch' ? 'Cannot connect to server. Ensure backend is running.' : error.message;
                errorMessage.style.display = 'block';

                // Reset button
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
